<!doctype html>
<html lang="sv">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buster - Admin</title>

    <!-- Faviconlänkar -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" type="image/png" href="/apple-touch-icon.png">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="/src/scss/main.scss">

    <!-- Kontroll av behörighet -->
    <script type="module" src="/src/js/checkAuth.js"></script>
</head>

<body>
    <div class="container">
        <header class="admin-header">
            <img src="/logo-buster-green.svg" width="260" height="62" alt="Logotyp Buster">
            <h1 class="login-header">Inloggad som administratör</h1>
            <button id="logout-btn" class="btn secondary-btn">Logga ut</button>
        </header>

        <main>
            <!-- Hantering bokningar -->
            <section class="admin-section">
                <div class="admin-section-content">
                    <div class="admin-section-column">
                        <h2 id="booking-form-title">Lägg till ny bokning</h2>
                        <form id="booking-form" autocomplete="on">
                            <label for="booking-date">Datum</label>
                            <input id="booking-date" name="booking-date" type="date">

                            <label for="booking-time">Tid</label>
                            <select id="booking-time">
                                <option value="" selected disabled>Välj tid</option>
                                <option value="11:30">11:30</option>
                                <option value="12:00">12:00</option>
                                <option value="12:30">12:30</option>
                                <option value="17:00">17:00</option>
                                <option value="17:30">17:30</option>
                                <option value="18:00">18:00</option>
                                <option value="18:30">18:30</option>
                                <option value="19:00">19:00</option>
                            </select>

                            <label for="booking-guests">Antal gäster</label>
                            <select id="booking-guests">
                                <option value="" selected disabled>Välj antal</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                            </select>

                            <label for="booking-name">Namn</label>
                            <input id="booking-name" name="booking-name" type="text">

                            <label for="booking-phone">Telefonnummer</label>
                            <input id="booking-phone" name="booking-phone" type="tel">

                            <ul id="booking-error"></ul>
                            <p id="booking-confirmation"></p>
                            <button type="submit" id="booking-btn" class="btn primary-btn">Spara</button>
                        </form>
                    </div>

                    <div class="admin-section-column">
                        <h2>Hantera bokningar</h2>
                        <div id="loader" class="spinner hidden"></div>
                        <p class="empty-state hidden"></p>
                        <ul class="booking-list">
                        </ul>
                    </div>
                </div>
            </section>

            <!-- Hantering meny -->
            <section class="admin-section">
                <div class="admin-section-content">
                    <div class="admin-section-column">
                        <h2 id="add-form-title">Lägg till ny rätt</h2>
                        <form id="add-form" autocomplete="off">
                            <label for="title">Namn</label>
                            <input id="title" name="title" type="text">

                            <label for="description">Beskrivning</label>
                            <textarea id="description" name="description" rows="3" cols="30"></textarea>

                            <label for="price">Pris</label>
                            <input id="price" name="price" type="number">

                            <ul id="error"></ul>
                            <p id="confirmation"></p>
                            <button type="submit" id="save" class="btn primary-btn">Spara</button>
                        </form>
                    </div>

                    <div class="admin-section-column">
                        <h2>Hantera meny</h2>
                        <p class="empty-state-menu hidden"></p>
                        <ul class="menu-list">
                        </ul>
                    </div>
                </div>
            </section>
        </main>

    </div>
    <script type="module" src="/src/js/protected.js"></script>
</body>

</html>
