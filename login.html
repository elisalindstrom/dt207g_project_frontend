<!doctype html>
<html lang="sv">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buster - Inloggning</title>

    <!-- Faviconlänkar -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" type="image/png" href="/apple-touch-icon.png">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="/src/scss/main.scss">
</head>

<body>
    <div class="container">
        <main>
            <section class="login-section">
                <img src="/logo-buster-footer.svg" alt="Logotyp Buster">
                <h1 class="login-header">Logga in som administratör</h1>

                <form id="login-form" autocomplete="on">
                    <label for="username">Användarnamn</label>
                    <input id="username" name="username" type="text">

                    <label for="password">Lösenord</label>
                    <input id="password" name="password" type="password">

                    <ul id="message"></ul>
                    <div id="loader" class="spinner hidden"></div>
                    <button type="submit" id="login-btn" class="btn primary-btn">Logga in</button>
                </form>
            </section>
        </main>
    </div>
    <script type="module" src="/src/js/login.js"></script>
</body>

</html>
